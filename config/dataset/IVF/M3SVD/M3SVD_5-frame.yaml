class_name: m3svd_dataset # class name of the dataset
disp_name: IVF-M3SVD # display name of the dataset, used for logging
dir: M3SVD
csv_dir: data_split/IVF/M3SVD # csv directory
num_frames: 5 # number of frames to sample
frame_gap_ls: [0] # frame gap between the first and second frames
stride: 1 # stride for sampling frames
frame_padding: true  # if true, repeat the first and last frames for padding